<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    color:white;
    background:black;
}

/* LOGIN REGISTER */
.box{
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

button:not(#logoutBtn){
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:white;
    color:black;
    cursor:pointer;
}

.switchText{
    margin-top:10px;
    font-size:13px;
}

/* DASHBOARD */
#dashboard{display:none;height:100%;}

#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

#profileBar{
    display:flex;
    align-items:center;
    gap:8px;
}

#profilePic{
    width:38px;
    height:38px;
    border-radius:50%;
    border:2px solid white;
}

#welcome{
    font-size:12px;
    font-weight:bold;
}

#emailText{
    font-size:10px;
    opacity:0.7;
}

#logoutBtn{
    font-size:10px;
    padding:3px 6px;
    border:none;
    border-radius:5px;
    background:white;
    cursor:pointer;
}

/* SIDEBAR */
#sidebar{
    width:80px;
    height:100%;
    float:left;
    background:#111;
    padding-top:20px;
    text-align:center;
}

.menuItem{
    margin:15px 0;
    cursor:pointer;
    font-size:18px;
}

/* CONTENT */
#mainContent{
    margin-left:80px;
    padding:15px;
}

.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<p class="switchText">
Belum punya akun?
<span onclick="showRegister()" style="color:cyan;cursor:pointer;">
Registrasi sekarang
</span>
</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>
<input id="regUser" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>

<p class="switchText">
Sudah punya akun?
<span onclick="showLogin()" style="color:cyan;cursor:pointer;">
Login sekarang
</span>
</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div id="topBar">
    <div style="display:flex;align-items:center;gap:8px;">
        <img id="profilePic" src="https://i.imgur.com/8Km9tLL.png">

        <div>
            <div id="welcome">ID: -</div>
            <div id="emailText">email</div>
        </div>
    </div>

    <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
<div class="menuItem" onclick="showNews()">📰</div>
<div class="menuItem" onclick="showQuiz()">📚</div>
<div class="menuItem" onclick="showInvest()">💰</div>
</div>

<!-- CONTENT -->
<div id="mainContent">

<div id="newsBox" class="card">Berita</div>
<div id="quizBox" class="card" style="display:none;">Soal</div>
<div id="investBox" class="card" style="display:none;">Investasi</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ID 4 digit */
function getOrCreateID(email){
    let key = "id_" + email;
    let id = localStorage.getItem(key);

    if(!id){
        id = Math.floor(1000 + Math.random()*9000);
        localStorage.setItem(key,id);
    }
    return id;
}

/* REGISTER */
function register(){
let email = regUser.value;
let pass = regPass.value;

auth.createUserWithEmailAndPassword(email, pass)
.then(()=>alert("Register sukses"))
.catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
let email = loginUser.value;
let pass = loginPass.value;

auth.signInWithEmailAndPassword(email, pass)
.then(u=>masuk(u.user.email))
.catch(e=>alert(e.message));
}

/* MASUK */
function masuk(email){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

let id = getOrCreateID(email);

welcome.innerText = "ID: " + id;
emailText.innerText = email;
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

/* MENU */
function showNews(){
newsBox.style.display="block";
quizBox.style.display="none";
investBox.style.display="none";

newsBox.innerHTML="📢 Berita terbaru muncul di sini";
}

function showQuiz(){
newsBox.style.display="none";
quizBox.style.display="block";
investBox.style.display="none";

quizBox.innerHTML="📚 Soal latihan muncul di sini";
}

function showInvest(){
newsBox.style.display="none";
quizBox.style.display="none";
investBox.style.display="block";

investBox.innerHTML="💰 Investasi mulai dari kecil";
}
</script>

</body>
</html>
