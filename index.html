<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB Uuusb</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    z-index:-1;
}

.box{
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    background:white;
    color:black;
}

.switchText{
    color:white;
    margin-top:12px;
    display:block;
    cursor:pointer;
}

#dashboard{display:none;height:100%;}

.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p class="switchText" onclick="showRegister()">Belum punya akun? Register</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>
<p class="switchText" onclick="showLogin()">Sudah punya akun? Login</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>

<div class="card">Dashboard Firebase aktif 🚀</div>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔑 CONFIG KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* SWITCH */
window.showRegister = function(){
loginBox.style.display="none";
registerBox.style.display="block";
}

window.showLogin = function(){
registerBox.style.display="none";
loginBox.style.display="block";
}

/* REGISTER */
window.register = function(){
let email = regUser.value + "@gmail.com";
let pass = regPass.value;

createUserWithEmailAndPassword(auth, email, pass)
.then(()=>{
alert("Register berhasil");
showLogin();
})
.catch(e=>alert(e.message));
}

/* LOGIN */
window.login = function(){
let email = loginUser.value + "@gmail.com";
let pass = loginPass.value;

signInWithEmailAndPassword(auth, email, pass)
.then((user)=>{
masuk(user.user.email);
})
.catch(()=>alert("Login gagal"));
}

/* MASUK */
function masuk(email){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

welcome.innerText="Halo " + email;
}

/* LOGOUT */
window.logout = function(){
signOut(auth);
dashboard.style.display="none";
loginBox.style.display="block";
}
</script>

</body>
</html>
