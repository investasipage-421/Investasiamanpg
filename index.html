<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

/* Firebase CDN (bukan module) */
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* REGISTER */
function register(){
let email = regUser.value;
let pass = regPass.value;

if(pass.length < 6){
alert("Password minimal 6 karakter");
return;
}

auth.createUserWithEmailAndPassword(email, pass)
.then(()=>{
alert("Register berhasil");
showLogin();
})
.catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
let email = loginUser.value;
let pass = loginPass.value;

auth.signInWithEmailAndPassword(email, pass)
.then((user)=>{
masuk(user.user.email);
})
.catch(e=>alert(e.message));
}

/* MASUK */
function masuk(user){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

welcome.innerText="Halo " + user;
showNews();
overlay.style.display="flex";
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
overlay.style.display="none";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}
</script>

<!-- Firebase CDN WAJIB -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
