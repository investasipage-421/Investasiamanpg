<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

/* LOGIN */
.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button:not(#logoutBtn){
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:white;
color:black;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;height:100%;}

/* TOP */
#topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

#profilePic{
width:38px;
height:38px;
border-radius:50%;
border:2px solid white;
}

#welcome{
font-size:12px;
font-weight:bold;
}

#emailText{
font-size:10px;
opacity:0.7;
}

#logoutBtn{
font-size:10px;
padding:3px 6px;
border:none;
border-radius:5px;
background:white;
cursor:pointer;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:70px;
width:75px;
background:#111;
height:auto;
padding:10px 0;
border-right:1px solid #333;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.menuItem{
text-align:center;
cursor:pointer;
padding:6px;
border-radius:10px;
transition:0.2s;
}

.menuItem img{
width:32px;
height:32px;
}

.menuItem.active{
background:white;
color:black;
transform:scale(1.05);
}

.menuItem:active{
transform:scale(0.9);
}

/* CONTENT */
#content{
padding:15px;
margin-left:85px;
}

.card{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<p>
Belum punya akun?
<span onclick="showRegister()" style="color:cyan;cursor:pointer;">
Registrasi sekarang
</span>
</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>
<input id="regUser" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>

<p>
Sudah punya akun?
<span onclick="showLogin()" style="color:cyan;cursor:pointer;">
Login sekarang
</span>
</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div id="topBar">
<div style="display:flex;align-items:center;gap:8px;">
<img id="profilePic" src="https://i.imgur.com/8Km9tLL.png">
<div>
<div id="welcome">ID: -</div>
<div id="emailText">email</div>
</div>
</div>

<button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">

<div class="menuItem" onclick="showNews()">
<img src="https://img.icons8.com/color/48/news.png">
<div style="font-size:10px;">Berita</div>
</div>

<div class="menuItem" onclick="showQuiz()">
<img src="https://img.icons8.com/color/48/book-shelf.png">
<div style="font-size:10px;">Soal</div>
</div>

<div class="menuItem" onclick="showInvest()">
<img src="https://img.icons8.com/color/48/coins.png">
<div style="font-size:10px;">Invest</div>
</div>

</div>

<!-- CONTENT -->
<div id="content">

<div id="newsBox" class="card">Berita</div>
<div id="quizBox" class="card" style="display:none;">Soal</div>
<div id="investBox" class="card" style="display:none;">Investasi</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
authDomain: "page421.firebaseapp.com",
databaseURL: "https://page421-default-rtdb.firebaseio.com",
projectId: "page421",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* REGISTER */
function register(){
auth.createUserWithEmailAndPassword(regUser.value,regPass.value)
.catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(loginUser.value,loginPass.value)
.then(u=>masuk(u.user))
.catch(e=>alert(e.message));
}

/* CREATE / GET USER DATA (FIREBASE ID) */
function createUserData(user){
const uid = user.uid;
const ref = db.ref("users/"+uid);

ref.once("value").then(snap=>{
if(!snap.exists()){
const id = Math.floor(1000+Math.random()*9000);

ref.set({
email:user.email,
id:id
});

setUI(user.email,id);
}else{
const data = snap.val();
setUI(data.email,data.id);
}
});
}

/* MASUK */
function masuk(user){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

createUserData(user);
}

/* UI */
function setUI(email,id){
welcome.innerText="ID: "+id;
emailText.innerText=email;
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

/* MENU */
function showNews(){
setActive(0);
newsBox.style.display="block";
quizBox.style.display="none";
investBox.style.display="none";
}

function showQuiz(){
setActive(1);
newsBox.style.display="none";
quizBox.style.display="block";
investBox.style.display="none";
}

function showInvest(){
setActive(2);
newsBox.style.display="none";
quizBox.style.display="none";
investBox.style.display="block";
}

/* ACTIVE MENU */
function setActive(i){
document.querySelectorAll(".menuItem").forEach((el,index)=>{
el.classList.toggle("active",index===i);
});
}

/* AUTH LISTENER */
auth.onAuthStateChanged(user=>{
if(user){
masuk(user);
}
});
</script>

</body>
</html>0p
