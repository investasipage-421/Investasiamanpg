<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Investasi Page421</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#4facfe,#a64bf4);
}

.box{
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
  font-size:18px;
  margin-bottom:5px;
  color:#555;
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-bottom:2px solid #ccc;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background: linear-gradient(90deg,#4facfe,#a64bf4);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>

</head>
<body>

<div class="box">
  <h1>Investasi Page421</h1>
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>
  <br><br>
  <button onclick="register()">DAFTAR</button>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 CONFIG KAMU (SUDAH DIPASANG)
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  databaseURL: "https://page421-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "page421",
  storageBucket: "page421.firebasestorage.app",
  messagingSenderId: "568195320694",
  appId: "1:568195320694:web:6c8c9815c8542d64300857",
  measurementId: "G-YRY2T3LEJG"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login berhasil!");
    })
    .catch((error) => {
      alert(error.message);
    });
}

// DAFTAR
window.register = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Akun berhasil dibuat!");
    })
    .catch((error) => {
      alert(error.message);
    });
}

</script>

</body>
</html>
