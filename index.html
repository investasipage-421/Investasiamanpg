<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investasi Page421 - Fast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:black;color:white;}

/* BOX LOGIN & REGISTER */
.box{background:#111;padding:25px;border-radius:15px;width:90%;max-width:350px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border: 1px solid #333;}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#222;color:white;outline:none;}
button:not(#logoutBtn, .btn-invest, .btn-depo){width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;font-weight:bold;background:white;color:black;cursor:pointer;}

/* DASHBOARD */
#dashboard{display:none;height:100%;}
#topBar{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111;border-bottom:1px solid #333;}
#welcome{font-size:18px;font-weight:bold;color: cyan;}
#emailText{font-size:11px;color:white;}
#logoutBtn{font-size:11px;padding:5px 10px;border:none;border-radius:5px;background:white;color:black;cursor:pointer;font-weight:bold;}

/* SIDEBAR */
#sidebar{position:fixed;left:0;top:75px;width:75px;background:#111;height:100%;padding-top:20px;border-right:1px solid #333;display:flex;flex-direction:column;align-items:center;gap:20px;}
.menuItem{text-align:center;cursor:pointer;padding:8px;border-radius:10px;width:60px;transition:0.3s;}
.menuItem img{width:30px;height:30px;}
.menuItem.active{background:white;color:black;}

/* CONTENT AREA */
#content{padding:20px;margin-left:80px;height:calc(100% - 75px);overflow-y:auto;}
.card{background:white;color:black;padding:20px;border-radius:15px;margin-bottom:15px;font-weight:bold;}

/* INVEST CARD STYLE */
.invest-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; color: white; }
.invest-title { color: cyan; font-size: 20px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
.invest-detail { margin: 5px 0; font-size: 14px; color: #ccc; }
.btn-invest { width: 100%; padding: 12px; background: cyan; border: none; border-radius: 8px; color: black; font-weight: bold; margin-top: 15px; cursor: pointer; }
.btn-invest:disabled { background: #333; color: #666; cursor: not-allowed; }

/* DEPO BOX PREMIUM */
.depo-container { background: #f1f1f1; border-radius: 15px; padding: 25px; text-align: center; border: 2px dashed #00b8d4; }
.btn-depo { width: 100%; padding: 15px; background: #000; color: #00e5ff; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
#statusTopup { margin-top: 10px; font-size: 12px; color: #856404; background: #fff3cd; padding: 10px; border-radius: 5px; display: none; }
</style>
</head>
<body>

<!-- LOGIN & REGISTER -->
<div class="box" id="loginBox">
    <h2>Login</h2>
    <input id="loginUser" type="email" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">MASUK</button>
    <p style="margin-top:15px; font-size:13px;">Belum punya akun? <span onclick="showRegister()" style="color:cyan;cursor:pointer;">Registrasi</span></p>
</div>

<div class="box" id="registerBox" style="display:none;">
    <h2>Registrasi</h2>
    <input id="regUser" type="email" placeholder="Email Baru">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">DAFTAR</button>
    <p style="margin-top:15px; font-size:13px;">Sudah punya akun? <span onclick="showLogin()" style="color:cyan;cursor:pointer;">Login</span></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div id="topBar">
        <div style="display:flex;align-items:center;gap:10px;">
            <img src="https://i.imgur.com/8Km9tLL.png" width="40">
            <div>
                <div id="welcome">Rp. 0</div>
                <div id="emailText">User</div>
            </div>
        </div>
        <button id="logoutBtn" onclick="logout()">Logout</button>
    </div>

    <div id="sidebar">
        <div class="menuItem active" id="mNews" onclick="showNews()"><img src="https://img.icons8.com/color/48/news.png"></div>
        <div class="menuItem" id="mInvest" onclick="showInvest()"><img src="https://img.icons8.com/color/48/coins.png"></div>
        <div class="menuItem" id="mDepo" onclick="showDepo()"><img src="https://img.icons8.com/color/48/request-money.png"></div>
    </div>

    <div id="content">
        <div id="newsBox" class="card">Selamat Datang!</div>

        <div id="investBox" style="display:none;">
            <div class="invest-card">
                <div class="invest-title">
                    <span>Paket Investasi A</span>
                    <span id="checkPaketA" style="display:none; color:#00e5ff; font-weight:bold;">✓ Aktif</span>
                </div>
                <div class="invest-detail">💰 Harga: Rp 20.000</div>
                <div class="invest-detail">📈 Profit: Rp 500 / Hari</div>
                <div class="invest-detail">📅 Durasi: 60 Hari</div>
                <div id="timerInfo" style="color:cyan; font-size:12px; margin-top:10px;"></div>
                <button id="btnBeliA" class="btn-invest" onclick="buyInvest()">BELI SEKARANG</button>
            </div>
        </div>

        <div id="depoBox" style="display:none;" class="card">
            <div class="depo-container">
                <p style="color:black">Depo Nominal Tetap:</p>
                <h1 style="color:black; margin:10px 0;">Rp 50.000</h1>
                <button id="btnKirimDepo" class="btn-depo" onclick="kirimDepo()">KIRIM PERMINTAAN</button>
                <div id="statusTopup">Menunggu Admin...</div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
    authDomain: "page421-b9a6c.firebaseapp.com",
    databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "page421-b9a6c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let saldoDepo = 0;
let myInvestments = [];
let currentBalance = 0;

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginBox').style.display = "none";
        document.getElementById('registerBox').style.display = "none";
        document.getElementById('dashboard').style.display = "block";
        document.getElementById('emailText').innerText = user.email;

        // Ambil Data Depo (Realtime)
        db.ref("topup").on("value", snap => {
            saldoDepo = 0;
            let pending = false;
            snap.forEach(c => {
                const d = c.val();
                if(d.uid === user.uid) {
                    if(d.status === "selesai") saldoDepo += parseInt(d.nominal);
                    if(d.status === "pending") pending = true;
                }
            });
            document.getElementById('statusTopup').style.display = pending ? "block" : "none";
            document.getElementById('btnKirimDepo').disabled = pending;
            hitungLaba();
        });

        // Ambil Data Investasi (Realtime)
        db.ref("invest_history/" + user.uid).on("value", snap => {
            myInvestments = [];
            snap.forEach(c => { myInvestments.push(c.val()); });
            hitungLaba();
        });
    } else {
        document.getElementById('loginBox').style.display = "block";
        document.getElementById('dashboard').style.display = "none";
    }
});

function hitungLaba() {
    let totalBayar = 0;
    let totalProfit = 0;
    let adaAktif = false;
    const sekarang = Date.now();

    myInvestments.forEach(inv => {
        totalBayar += 20000;
        let hari = Math.floor((sekarang - inv.tanggalBeli) / (1000 * 60 * 60 * 24));
        if (hari > 60) hari = 60; 
        if (hari < 0) hari = 0;
        totalProfit += (hari * 500);

        if ((sekarang - inv.tanggalBeli) < (60 * 86400000)) {
            adaAktif = true;
            document.getElementById('timerInfo').innerText = "Sisa Durasi: " + (60 - hari) + " Hari";
        }
    });

    currentBalance = saldoDepo - totalBayar + totalProfit;
    document.getElementById('welcome').innerText = "Rp. " + currentBalance.toLocaleString();
    
    // Update Tombol & Centang Biru
    document.getElementById('checkPaketA').style.display = adaAktif ? "inline" : "none";
    document.getElementById('btnBeliA').disabled = adaAktif;
    document.getElementById('btnBeliA').innerText = adaAktif ? "PAKET AKTIF" : "BELI SEKARANG";
}

function buyInvest() {
    const user = auth.currentUser;
    if (currentBalance < 20000) return alert("Saldo tidak cukup!");

    // Proses Instan: Langsung simpan ke DB tanpa loading screen yang lama
    db.ref("invest_history/" + user.uid).push({
        tanggalBeli: Date.now(),
        harga: 20000
    });
}

function kirimDepo() {
    const user = auth.currentUser;
    db.ref("topup").push({
        uid: user.uid,
        email: user.email,
        nominal: 50000,
        status: "pending"
    });
}

// Navigasi Dasar
function login() { auth.signInWithEmailAndPassword(loginUser.value, loginPass.value).catch(e => alert("Gagal Login")); }
function register() { auth.createUserWithEmailAndPassword(regUser.value, regPass.value).then(() => showLogin()); }
function logout() { auth.signOut().then(() => location.reload()); }
function showRegister() { loginBox.style.display="none"; registerBox.style.display="block"; }
function showLogin() { registerBox.style.display="none"; loginBox.style.display="block"; }
function clear() { newsBox.style.display=investBox.style.display=depoBox.style.display="none"; 
                   mNews.classList.remove('active'); mInvest.classList.remove('active'); mDepo.classList.remove('active');}
function showNews() { clear(); newsBox.style.display="block"; mNews.classList.add('active'); }
function showInvest() { clear(); investBox.style.display="block"; mInvest.classList.add('active'); }
function showDepo() { clear(); depoBox.style.display="block"; mDepo.classList.add('active'); }
</script>
</body>
</html>
