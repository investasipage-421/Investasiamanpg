<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investasi Page421</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
html,body{width:100%;height:100%;overflow:hidden;background:black;color:white;}

.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:white;
color:black;
cursor:pointer;
}

#dashboard{display:none;height:100%;}

#topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

#welcome{font-size:13px;font-weight:bold;}
#saldoText{font-size:11px;opacity:0.8;}

#sidebar{
position:fixed;
left:0;
top:70px;
width:75px;
background:#111;
padding:10px 0;
border-right:1px solid #333;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.menuItem{
cursor:pointer;
padding:10px;
border-radius:10px;
}
.menuItem:active{
background:white;
color:black;
}

#content{
padding:15px;
margin-left:85px;
}

/* CARD */
.card{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p onclick="showRegister()" style="color:cyan;cursor:pointer;">Registrasi</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>
<input id="regUser" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>
<p onclick="showLogin()" style="color:cyan;cursor:pointer;">Login</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div id="topBar">
<div>
<div id="welcome">Halo 👋</div>
<div id="saldoText">Saldo: Rp 0</div>
</div>
<button onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR (USER ONLY) -->
<div id="sidebar">
<div class="menuItem" onclick="showNews()">📰</div>
<div class="menuItem" onclick="showQuiz()">📚</div>
<div class="menuItem" onclick="showInvest()">💰</div>
</div>

<!-- CONTENT -->
<div id="content">

<div id="newsBox" class="card">Berita</div>
<div id="quizBox" class="card" style="display:none;">Soal</div>
<div id="investBox" class="card" style="display:none;">Investasi</div>

<!-- 🔥 ADMIN BOX -->
<div id="adminBox" class="card" style="display:none;">
<h3>👑 Dashboard Admin</h3>
<p>Panel admin kosong dulu</p>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
authDomain: "page421.firebaseapp.com",
databaseURL: "https://page421-default-rtdb.firebaseio.com",
projectId: "page421",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const ADMIN_EMAIL = "nagha.kancil@gmail.com";

/* REGISTER */
function register(){
auth.createUserWithEmailAndPassword(regUser.value, regPass.value)
.then(()=>{ alert("Registrasi berhasil!"); return auth.signOut(); })
.then(()=>showLogin())
.catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(loginUser.value, loginPass.value)
.catch(e=>alert(e.message));
}

/* SAVE USER */
function saveUser(user){
const ref = db.ref("users/" + user.uid);

ref.once("value").then(snap=>{
if(!snap.exists()){
ref.set({email:user.email,saldo:0});
}
});

ref.on("value", snap=>{
let data = snap.val();

let nama = data.email.split("@")[0];
nama = nama.charAt(0).toUpperCase() + nama.slice(1);

welcome.innerText = "Halo, " + nama;
saldoText.innerText = "Saldo: Rp " + (data.saldo || 0);
});
}

/* MASUK */
function masuk(user){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

saveUser(user);

// 🔥 ADMIN MODE
if(user.email === ADMIN_EMAIL){

sidebar.style.display = "none";

newsBox.style.display="none";
quizBox.style.display="none";
investBox.style.display="none";

adminBox.style.display="block";

}else{

sidebar.style.display = "flex";
showNews();

}
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
}

/* MENU USER */
function showNews(){
newsBox.style.display="block";
quizBox.style.display="none";
investBox.style.display="none";
adminBox.style.display="none";
}

function showQuiz(){
newsBox.style.display="none";
quizBox.style.display="block";
investBox.style.display="none";
adminBox.style.display="none";
}

function showInvest(){
newsBox.style.display="none";
quizBox.style.display="none";
investBox.style.display="block";
adminBox.style.display="none";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{
if(user){
masuk(user);
}
});
</script>

</body>
</html>
