<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fingrow Clone</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0f14;color:white;}

/* LOGIN */
.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:350px;
background:#161b22;
padding:20px;
border-radius:15px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#0d1117;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#2ea043;
color:white;
font-weight:bold;
margin-top:10px;
}

/* DASHBOARD */
#app{display:none;}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#1f6feb;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.balanceCard{
margin:20px;
padding:20px;
border-radius:15px;
background:linear-gradient(135deg,#1f6feb,#2ea043);
}

.balanceCard p{font-size:12px;opacity:0.9;}
.balanceCard h1{font-size:26px;margin-top:5px;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:20px;
}

.item{
background:#161b22;
padding:15px;
border-radius:12px;
text-align:center;
font-size:12px;
}

.card{
margin:15px;
padding:15px;
background:#161b22;
border-radius:12px;
}

/* ADMIN */
#adminPanel{display:none;}

/* BOTTOM NAV */
.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0d1117;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #222;
}

.navItem{font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p onclick="toggle()" style="color:cyan;cursor:pointer;margin-top:10px;">Register</p>
</div>

<!-- APP -->
<div id="app">

<div class="top">
<div>
<h3 id="hello">Halo</h3>
<p style="opacity:0.6;font-size:12px;">Dashboard Finansial</p>
</div>
<div class="avatar">U</div>
</div>

<div class="balanceCard">
<p>Total Saldo</p>
<h1 id="saldo">Rp 0</h1>
</div>

<div class="grid">
<div class="item">Deposit</div>
<div class="item">Withdraw</div>
<div class="item">Invest</div>
<div class="item">History</div>
</div>

<div class="card">
<h3>📊 Aktivitas</h3>
<p style="opacity:0.6;font-size:12px;">Belum ada transaksi</p>
</div>

<!-- ADMIN -->
<div class="card" id="adminPanel">
<h3>👑 Admin Panel</h3>
<p>Hanya admin yang lihat ini</p>
</div>

<div class="bottomNav">
<div class="navItem">Home</div>
<div class="navItem">Market</div>
<div class="navItem">Wallet</div>
<div class="navItem">Profile</div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "page421.firebaseapp.com",
databaseURL: "https://page421-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "page421",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const ADMIN_EMAIL = "nagha.kancil@gmail.com";

/* UI */
const loginBox = document.getElementById("loginBox");
const app = document.getElementById("app");
const saldo = document.getElementById("saldo");
const hello = document.getElementById("hello");
const adminPanel = document.getElementById("adminPanel");

/* REGISTER / LOGIN TOGGLE */
function toggle(){
alert("Gunakan Firebase register di upgrade berikutnya 👍");
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value, pass.value)
.catch(e=>alert(e.message));
}

/* SAVE USER */
function saveUser(user){
const ref = db.ref("users/"+user.uid);

ref.once("value").then(snap=>{
if(!snap.exists()){
ref.set({
email:user.email,
saldo:0,
role:user.email.toLowerCase()===ADMIN_EMAIL.toLowerCase()?"admin":"user"
});
}
});

ref.on("value", snap=>{
let data = snap.val();

let name = data.email.split("@")[0];
hello.innerText = "Halo, "+name;

saldo.innerText = "Rp "+(data.saldo||0);

if(data.role==="admin"){
adminPanel.style.display="block";
}else{
adminPanel.style.display="none";
}
});
}

/* MASUK */
function masuk(user){
loginBox.style.display="none";
app.style.display="block";
saveUser(user);
}

/* LOGOUT */
auth.onAuthStateChanged(user=>{
if(user){
masuk(user);
}else{
app.style.display="none";
loginBox.style.display="block";
}
});
</script>

</body>
</html>
