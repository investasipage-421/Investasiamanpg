<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investasi Page421</title>
    <!-- Tailwind CSS 3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { background-color: black; color: white; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">

<div id="root"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = FramerMotion;

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
        authDomain: "page421-b9a6c.firebaseapp.com",
        databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "page421-b9a6c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [isRegistering, setIsRegistering] = useState(false);
        const [activeMenu, setActiveMenu] = useState('news');
        const [showAnnouncement, setShowAnnouncement] = useState(false);
        const [balance, setBalance] = useState(0);
        const [userPhoto, setUserPhoto] = useState('https://i.imgur.com/8Km9tLL.png');
        const [investmentStatus, setInvestmentStatus] = useState({ active: false, daysLeft: 0 });
        const [withdrawAmount, setWithdrawAmount] = useState('50.000');
        const [transactions, setTransactions] = useState([]);

        useEffect(() => {
            return auth.onAuthStateChanged(u => {
                setUser(u);
                setLoading(false);
                if (u) {
                    setShowAnnouncement(true);
                    loadData(u.uid);
                }
            });
        }, []);

        const loadData = (uid) => {
            db.ref(`users/${uid}/photo`).on('value', snap => {
                if (snap.val()) setUserPhoto(snap.val());
            });

            let topupTotal = 0;
            let tarikTotal = 0;
            let history = [];
            let allTx = [];

            const calculateBalance = () => {
                let cost = 0;
                let profit = 0;
                let isActive = false;
                let left = 0;
                const now = Date.now();

                history.forEach(inv => {
                    cost += 20000;
                    const diffDays = Math.floor((now - inv.tanggalBeli) / 86400000);
                    const pDays = diffDays > 60 ? 60 : diffDays;
                    profit += (pDays * 500);
                    if (diffDays < 60) {
                        isActive = true;
                        left = 60 - diffDays;
                    }
                });

                setInvestmentStatus({ active: isActive, daysLeft: left });
                setBalance(topupTotal - cost + profit - tarikTotal);
                setTransactions([...allTx].sort((a,b) => b.timestamp - a.timestamp));
            };

            db.ref("topup").on('value', snap => {
                topupTotal = 0;
                allTx = allTx.filter(t => t.type !== 'depo');
                snap.forEach(c => {
                    const v = c.val();
                    if(v.uid === uid) {
                        if(v.status === "selesai") topupTotal += parseInt(v.nominal);
                        allTx.push({id: c.key, type: 'depo', nominal: v.nominal, status: v.status, timestamp: v.timestamp });
                    }
                });
                calculateBalance();
            });

            db.ref("penarikan").on('value', snap => {
                tarikTotal = 0;
                allTx = allTx.filter(t => t.type !== 'tarik');
                snap.forEach(c => {
                    const v = c.val();
                    if(v.uid === uid) {
                        if(v.status === "selesai") tarikTotal += parseInt(v.nominal);
                        allTx.push({id: c.key, type: 'tarik', nominal: v.nominal, status: v.status, timestamp: v.timestamp });
                    }
                });
                calculateBalance();
            });

            db.ref(`invest_history/${uid}`).on('value', snap => {
                history = [];
                snap.forEach(c => { history.push(c.val()); });
                calculateBalance();
            });
        };

        const handleLogin = (e) => {
            e.preventDefault();
            auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
        };

        const handleRegister = (e) => {
            e.preventDefault();
            auth.createUserWithEmailAndPassword(email, password).then(() => {
                auth.signOut();
                alert("Registrasi Berhasil! Silakan Login.");
                setIsRegistering(false);
            }).catch(err => alert(err.message));
        };

        const handleWithdraw = () => {
            const amount = parseInt(withdrawAmount.replace(/\./g, ''));
            if(amount < 50000) return alert("Minimal Rp 50.000");
            if(balance < amount) return alert("Saldo Kurang");
            db.ref("penarikan").push({
                uid: user.uid, email: user.email, nominal: amount, status: "pending", timestamp: Date.now()
            }).then(() => alert("Request Terkirim!"));
        };

        if (loading) return <div className="h-screen bg-black flex items-center justify-center text-cyan-400 font-bold">Memuat...</div>;

        if (!user) return (
            <div className="h-screen flex items-center justify-center bg-black px-6">
                <div className="w-full max-w-sm bg-[#111] border border-white/10 p-8 rounded-2xl text-center">
                    <div className="bg-white w-24 h-24 mx-auto mb-6 rounded-xl p-2 flex items-center justify-center">
                        <svg viewBox="0 0 100 100" className="w-full h-full">
                            <rect x="5" y="5" width="90" height="90" rx="8" fill="none" stroke="black" strokeWidth="4"/>
                            <path d="M25 25 v50 M25 25 h20 c15 0 15 20 0 20 h-20" fill="none" stroke="black" strokeWidth="8" strokeLinecap="round"/>
                            <text x="48" y="65" fontFamily="Arial" fontWeight="bold" fontSize="20" fill="black">Age</text>
                        </svg>
                    </div>
                    <h2 className="text-2xl font-bold mb-6">{isRegistering ? 'Registrasi' : 'Login'}</h2>
                    <form onSubmit={isRegistering ? handleRegister : handleLogin} className="space-y-4">
                        <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-[#222] p-3 rounded-lg outline-none ring-1 ring-white/5 focus:ring-cyan-500" />
                        <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-[#222] p-3 rounded-lg outline-none ring-1 ring-white/5 focus:ring-cyan-500" />
                        <button type="submit" className="w-full bg-white text-black font-bold py-3 rounded-lg active:scale-95 transition">{isRegistering ? 'DAFTAR' : 'MASUK'}</button>
                    </form>
                    <p className="mt-6 text-sm text-gray-500">
                        {isRegistering ? 'Sudah punya akun?' : 'Belum punya akun?'} 
                        <span onClick={() => setIsRegistering(!isRegistering)} className="text-cyan-400 font-bold ml-1 cursor-pointer">
                            {isRegistering ? 'Login' : 'Registrasi'}
                        </span>
                    </p>
                </div>
            </div>
        );

        return (
            <div className="h-screen bg-black text-white">
                {/* Announcement */}
                <AnimatePresence>
                    {showAnnouncement && (
                        <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-6">
                            <motion.div initial={{scale:0.8}} animate={{scale:1}} className="bg-[#111] border-2 border-cyan-500 p-10 rounded-3xl max-w-sm text-center relative">
                                <button onClick={() => setShowAnnouncement(false)} className="absolute top-4 right-4 text-gray-500 text-2xl">✕</button>
                                <h2 className="text-cyan-400 text-xl font-bold mb-4">📢 Pengumuman</h2>
                                <p className="text-gray-300">Selamat datang di Investasi Page421! Pantau terus paket investasi Anda.</p>
                            </motion.div>
                        </motion.div>
                    )}
                </AnimatePresence>

                {/* Navbar */}
                <div className="h-20 bg-[#111] border-b border-white/10 px-6 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full border-2 border-cyan-500 overflow-hidden">
                            <img src={userPhoto} className="w-full h-full object-cover" />
                        </div>
                        <div>
                            <div className="text-cyan-400 font-bold text-lg">Rp {balance.toLocaleString('id-ID')}</div>
                            <div className="text-[10px] text-gray-400">{user.email}</div>
                        </div>
                    </div>
                    <button onClick={() => auth.signOut().then(() => window.location.reload())} className="bg-white text-black text-xs font-bold px-4 py-2 rounded-lg">Logout</button>
                </div>

                <div className="flex h-[calc(100vh-80px)]">
                    {/* Sidebar */}
                    <div className="w-20 bg-[#111] border-r border-white/10 flex flex-col items-center py-6 gap-6">
                        {[
                            {id: 'news', icon: 'newspaper'},
                            {id: 'quiz', icon: 'book-open'},
                            {id: 'invest', icon: 'coins'},
                            {id: 'depo', icon: 'arrow-down-to-line'},
                            {id: 'tarik', icon: 'arrow-up-from-line'},
                            {id: 'history', icon: 'history'},
                        ].map(item => (
                            <div key={item.id} onClick={() => setActiveMenu(item.id)} className={`p-2 rounded-xl cursor-pointer ${activeMenu === item.id ? 'bg-white text-black' : 'text-gray-500'}`}>
                                <i data-lucide={item.icon} className="w-6 h-6"></i>
                            </div>
                        ))}
                    </div>

                    {/* Content Area */}
                    <div className="flex-1 p-6 overflow-y-auto">
                        {activeMenu === 'news' && <div className="bg-white text-black p-6 rounded-2xl font-bold">Selamat Datang di Page421!</div>}
                        
                        {activeMenu === 'invest' && (
                            <div className="bg-[#1a1a1a] border border-white/10 p-6 rounded-2xl">
                                <div className="text-cyan-400 font-bold text-xl border-b border-white/5 pb-2 mb-4 flex justify-between">
                                    <span>Paket Investasi A</span>
                                    {investmentStatus.active && <span className="text-xs">✓ Aktif</span>}
                                </div>
                                <p className="text-sm text-gray-400 mb-1">💰 Harga: Rp 20.000</p>
                                <p className="text-sm text-gray-400 mb-1">📈 Profit: Rp 500 / Hari</p>
                                <p className="text-sm text-gray-400 mb-4">📅 Durasi: 60 Hari</p>
                                {investmentStatus.active && <div className="text-cyan-400 text-xs font-bold mb-4">Sisa: {investmentStatus.daysLeft} Hari</div>}
                                <button 
                                    disabled={investmentStatus.active}
                                    onClick={() => {
                                        if(balance < 20000) return alert("Saldo Kurang");
                                        db.ref(`invest_history/${user.uid}`).push({tanggalBeli: Date.now(), harga:20000});
                                    }}
                                    className={`w-full py-3 rounded-xl font-bold ${investmentStatus.active ? 'bg-gray-800 text-gray-500' : 'bg-cyan-500 text-black'}`}
                                >
                                    {investmentStatus.active ? 'PAKET AKTIF' : 'BELI SEKARANG'}
                                </button>
                            </div>
                        )}

                        {activeMenu === 'depo' && (
                            <div className="bg-white text-black p-8 rounded-2xl text-center">
                                <div className="border-2 border-dashed border-cyan-500 p-6 rounded-2xl">
                                    <p className="text-sm">Nominal Depo:</p>
                                    <h1 className="text-3xl font-black my-2">Rp 50.000</h1>
                                    <button onClick={() => {
                                        db.ref("topup").push({uid: user.uid, email: user.email, nominal: 50000, status: "pending", timestamp: Date.now()});
                                        alert("Request Terkirim!");
                                    }} className="w-full bg-black text-cyan-400 py-3 rounded-xl font-bold mt-4">REQUEST DEPO</button>
                                </div>
                            </div>
                        )}

                        {activeMenu === 'tarik' && (
                            <div className="flex justify-center">
                                <div className="w-full max-w-sm bg-[#111] p-8 rounded-[24px] border border-white/10 text-center shadow-xl">
                                    <h2 className="text-2xl font-bold mb-1">Penarikan</h2>
                                    <p className="text-[10px] text-gray-500 mb-6">Saldo: Rp {balance.toLocaleString()}</p>
                                    <input 
                                        type="text" 
                                        value={withdrawAmount} 
                                        onChange={e => setWithdrawAmount(e.target.value)} 
                                        onFocus={() => withdrawAmount === '50.000' && setWithdrawAmount('')}
                                        className="w-full bg-[#222] p-4 text-center text-2xl font-black rounded-xl mb-4 border border-white/5 outline-none focus:ring-1 ring-red-500" 
                                    />
                                    <button onClick={handleWithdraw} className="w-full bg-red-500 py-4 rounded-xl font-bold active:scale-95 transition">REQUEST TARIK</button>
                                </div>
                            </div>
                        )}

                        {activeMenu === 'history' && (
                            <div className="space-y-3">
                                <h2 className="text-cyan-400 font-bold mb-4">Riwayat Transaksi</h2>
                                {transactions.map(t => (
                                    <div key={t.id} className="bg-[#111] border border-white/5 p-4 rounded-xl flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${t.type === 'depo' ? 'bg-cyan-500/10 text-cyan-500' : 'bg-red-500/10 text-red-500'}`}>
                                                <i data-lucide={t.type === 'depo' ? 'arrow-down' : 'arrow-up'} className="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <div className="font-bold text-sm">{t.type === 'depo' ? 'Depo' : 'Tarik'} Rp {parseInt(t.nominal).toLocaleString()}</div>
                                                <div className="text-[10px] text-gray-500">{t.timestamp ? new Date(t.timestamp).toLocaleTimeString() : ''}</div>
                                            </div>
                                        </div>
                                        <span className={`text-[10px] font-bold px-2 py-1 rounded-full ${t.status === 'selesai' ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'}`}>
                                            {t.status.toUpperCase()}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Initialize icons after React render
    setTimeout(() => lucide.createIcons(), 500);
</script>

</body>
</html>
