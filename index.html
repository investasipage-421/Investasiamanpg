<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investasi Page421</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

/* LOGIN / REGISTER */
.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button:not(#logoutBtn){
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:white;
color:black;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;height:100%;}

/* TOP BAR */
#topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

#profilePic{
width:38px;
height:38px;
border-radius:50%;
border:2px solid white;
}

#welcome{font-size:12px;font-weight:bold;}
#emailText{font-size:10px;opacity:0.7;}

#logoutBtn{
font-size:10px;
padding:3px 6px;
border:none;
border-radius:5px;
background:white;
cursor:pointer;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:70px;
width:75px;
background:#111;
padding:10px 0;
border-right:1px solid #333;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.menuItem{
text-align:center;
cursor:pointer;
padding:6px;
border-radius:10px;
transition:0.2s;
}

.menuItem.active{
background:white;
color:black;
}

/* CONTENT */
#content{
padding:15px;
margin-left:85px;
}

.card{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<p>Belum punya akun?
<span onclick="showRegister()" style="color:cyan;cursor:pointer;">Registrasi</span>
</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>
<input id="regUser" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>

<p>Sudah punya akun?
<span onclick="showLogin()" style="color:cyan;cursor:pointer;">Login</span>
</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div id="topBar">
<div style="display:flex;align-items:center;gap:8px;">
<img id="profilePic" src="https://i.imgur.com/8Km9tLL.png">
<div>
<div id="welcome">ID: -</div>
<div id="emailText">email</div>
</div>
</div>

<button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
<div class="menuItem" onclick="showNews()">📰 Berita</div>
<div class="menuItem" onclick="showQuiz()">📚 Soal</div>
<div class="menuItem" onclick="showInvest()">💰 Invest</div>
</div>

<!-- CONTENT -->
<div id="content">
<div id="newsBox" class="card">Berita</div>
<div id="quizBox" class="card" style="display:none;">Soal</div>
<div id="investBox" class="card" style="display:none;">Investasi</div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
authDomain: "page421.firebaseapp.com",
databaseURL: "https://page421-default-rtdb.firebaseio.com",
projectId: "page421",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* ELEMENT */
const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");
const dashboard = document.getElementById("dashboard");

const loginUser = document.getElementById("loginUser");
const loginPass = document.getElementById("loginPass");

const regUser = document.getElementById("regUser");
const regPass = document.getElementById("regPass");

let isRegistering = false;

/* REGISTER FIX */
function register(){
isRegistering = true;

auth.createUserWithEmailAndPassword(regUser.value, regPass.value)
.then(()=>{
alert("Registrasi berhasil!");

auth.signOut();
showLogin();

regUser.value="";
regPass.value="";
})
.catch(e=>alert(e.message))
.finally(()=>{
setTimeout(()=>{ isRegistering = false; }, 1000);
});
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(loginUser.value, loginPass.value)
.catch(e=>alert(e.message));
}

/* MASUK */
function masuk(user){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
registerBox.style.display="none";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

/* MENU */
function showNews(){
document.getElementById("newsBox").style.display="block";
document.getElementById("quizBox").style.display="none";
document.getElementById("investBox").style.display="none";
}

function showQuiz(){
document.getElementById("newsBox").style.display="none";
document.getElementById("quizBox").style.display="block";
document.getElementById("investBox").style.display="none";
}

function showInvest(){
document.getElementById("newsBox").style.display="none";
document.getElementById("quizBox").style.display="none";
document.getElementById("investBox").style.display="block";
}

/* AUTO LOGIN FIX */
auth.onAuthStateChanged(user=>{
if(user){

if(isRegistering){
auth.signOut();
return;
}

masuk(user);
}
});
</script>

</body>
</html>
