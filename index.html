<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
html,body{width:100%;height:100%;overflow:hidden;background:black;color:white;}

/* LOADING */
#loading{display:none;position:fixed;top:10px;left:50%;transform:translateX(-50%);color:white;font-size:12px;z-index:1000;background:rgba(0,0,0,0.7);padding:5px 10px;border-radius:5px;}

/* LOGIN BOX */
.box{background:#111;padding:25px;border-radius:15px;width:90%;max-width:350px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #333;}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#222;color:white;outline:none;}
button:not(#logoutBtn, .btn-invest){width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;font-weight:bold;background:white;color:black;cursor:pointer;}

/* DASHBOARD */
#dashboard{display:none;height:100%;}
#topBar{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111;border-bottom:1px solid #333;}
#welcome{font-size:18px;font-weight:bold;color: cyan;}
#emailText{font-size:11px;color:white;}
#logoutBtn{font-size:11px;padding:5px 10px;border:none;border-radius:5px;background:white;color:black;cursor:pointer;font-weight:bold;}

/* SIDEBAR */
#sidebar{position:fixed;left:0;top:75px;width:75px;background:#111;height:100%;padding-top:20px;border-right:1px solid #333;display:flex;flex-direction:column;align-items:center;gap:20px;}
.menuItem{text-align:center;cursor:pointer;padding:8px;border-radius:10px;width:60px;transition:0.3s;}
.menuItem img{width:30px;height:30px;}
.menuItem.active{background:white;color:black;}

/* CONTENT */
#content{padding:20px;margin-left:80px;height:calc(100% - 75px);overflow-y:auto;}
.card{background:white;color:black;padding:20px;border-radius:12px;margin-bottom:15px;font-weight:bold;}

.btn-invest {width:100%;padding:12px;background:cyan;border:none;border-radius:8px;color:black;font-weight:bold;margin-top:10px;cursor:pointer;}

/* STATUS STYLE */
#statusTopup {margin-top:15px; padding:12px; border-radius:8px; font-size:13px; display:none; text-align:center;}
.pending-style { background:#fff3cd; color:#856404; border:1px solid #ffeeba; }
.selesai-style { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
</style>
</head>
<body>

<div id="loading">Memproses...</div>

<!-- BOX LOGIN -->
<div class="box" id="loginBox">
    <h2>Login</h2>
    <input id="loginUser" type="email" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p style="margin-top:15px; font-size:12px;">Belum punya akun? <span onclick="showRegister()" style="color:cyan;cursor:pointer;">Daftar</span></p>
</div>

<!-- BOX REGISTER -->
<div class="box" id="registerBox" style="display:none;">
    <h2>Daftar</h2>
    <input id="regUser" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password 6 Digit">
    <button onclick="register()">Daftar Sekarang</button>
    <p style="margin-top:15px; font-size:12px;">Sudah punya akun? <span onclick="showLogin()" style="color:cyan;cursor:pointer;">Login</span></p>
</div>

<!-- DASHBOARD UI -->
<div id="dashboard">
    <div id="topBar">
        <div style="display:flex;align-items:center;gap:10px;">
            <img id="profilePic" src="https://i.imgur.com/8Km9tLL.png" width="40">
            <div>
                <div id="welcome">Rp. 0</div>
                <div id="emailText">Memuat...</div>
            </div>
        </div>
        <button id="logoutBtn" onclick="logout()">Logout</button>
    </div>

    <div id="sidebar">
        <div class="menuItem active" id="mNews" onclick="showNews()">
            <img src="https://img.icons8.com/color/48/news.png">
        </div>
        <div class="menuItem" id="mInvest" onclick="showInvest()">
            <img src="https://img.icons8.com/color/48/coins.png">
        </div>
        <div class="menuItem" id="mDepo" onclick="showDepo()">
            <img src="https://img.icons8.com/color/48/request-money.png">
        </div>
    </div>

    <div id="content">
        <!-- BOX BERITA -->
        <div id="newsBox" class="card">
            Halaman Berita Utama<br>
            <span style="font-weight:normal; font-size:14px;">Selamat datang di aplikasi investasi.</span>
        </div>

        <!-- BOX INVEST -->
        <div id="investBox" class="card" style="display:none;">
            Menu Investasi<br>
            <span style="font-weight:normal; font-size:14px;">Silakan pilih paket investasi Anda.</span>
        </div>

        <!-- BOX DEPO -->
        <div id="depoBox" class="card" style="display:none;">
            <h3 style="margin-bottom:10px;">Deposit Saldo</h3>
            <div style="background:#f1f1f1; padding:15px; border-radius:10px; text-align:center;">
                <p style="font-weight:normal; font-size:14px; color:black;">Nominal:</p>
                <h1 style="color:black;">Rp 50.000</h1>
                <button id="btnKirimTopup" class="btn-invest" onclick="kirimDepo()">Request Depo</button>
            </div>
            
            <!-- Tempat Status Muncul -->
            <div id="statusTopup"></div>
        </div>
    </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
    authDomain: "page421-b9a6c.firebaseapp.com",
    databaseURL: "https://page421-b9a6c-default-rtdb.firebaseio.com",
    projectId: "page421-b9a6c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginBox').style.display = "none";
        document.getElementById('registerBox').style.display = "none";
        document.getElementById('dashboard').style.display = "block";
        document.getElementById('emailText').innerText = user.email;

        // BACA SEMUA DATA DI FOLDER TOPUP
        db.ref("topup").on("value", (snap) => {
            let totalSaldo = 0;
            let statusBox = document.getElementById('statusTopup');
            let btn = document.getElementById('btnKirimTopup');
            let adaRequestAktif = false;

            snap.forEach((child) => {
                const data = child.val();
                if (data.uid === user.uid) {
                    // Jika status 'selesai', tambahkan ke saldo
                    if (data.status === "selesai") {
                        totalSaldo += parseInt(data.nominal);
                    }

                    // Tampilkan status terakhir (jika pending)
                    if (data.status === "pending") {
                        adaRequestAktif = true;
                        statusBox.style.display = "block";
                        statusBox.className = "pending-style";
                        statusBox.innerHTML = "🕒 Menunggu ACC Admin (Rp 50.000)";
                        btn.disabled = true;
                        btn.style.background = "#ccc";
                    }
                }
            });

            // Update Saldo di Dashboard
            document.getElementById('welcome').innerText = "Rp. " + totalSaldo.toLocaleString('id-ID');

            // Jika tidak ada yang pending, reset tombol depo
            if (!adaRequestAktif) {
                statusBox.style.display = "none";
                btn.disabled = false;
                btn.style.background = "cyan";
            }
        });

    } else {
        document.getElementById('loginBox').style.display = "block";
        document.getElementById('dashboard').style.display = "none";
    }
});

function kirimDepo() {
    const user = auth.currentUser;
    const orderID = Date.now();
    document.getElementById('loading').style.display = "block";

    db.ref("topup/" + orderID).set({
        uid: user.uid,
        email: user.email,
        nominal: 50000,
        status: "pending"
    }).then(() => {
        document.getElementById('loading').style.display = "none";
        alert("Berhasil! Permintaan terkirim.");
    });
}

function login(){
    const email = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Login Gagal"));
}

function register(){
    const email = document.getElementById('regUser').value;
    const pass = document.getElementById('regPass').value;
    auth.createUserWithEmailAndPassword(email, pass).then(() => {
        alert("Daftar Berhasil!");
        showLogin();
    });
}

function logout(){ auth.signOut().then(() => location.reload()); }
function showLogin(){ document.getElementById('registerBox').style.display="none"; document.getElementById('loginBox').style.display="block"; }
function showRegister(){ document.getElementById('loginBox').style.display="none"; document.getElementById('registerBox').style.display="block"; }

// NAVIGASI MENU
function clearMenu(){
    document.getElementById('newsBox').style.display = "none";
    document.getElementById('investBox').style.display = "none";
    document.getElementById('depoBox').style.display = "none";
    document.getElementById('mNews').classList.remove('active');
    document.getElementById('mInvest').classList.remove('active');
    document.getElementById('mDepo').classList.remove('active');
}
function showNews(){ clearMenu(); document.getElementById('newsBox').style.display = "block"; document.getElementById('mNews').classList.add('active'); }
function showInvest(){ clearMenu(); document.getElementById('investBox').style.display = "block"; document.getElementById('mInvest').classList.add('active'); }
function showDepo(){ clearMenu(); document.getElementById('depoBox').style.display = "block"; document.getElementById('mDepo').classList.add('active'); }

</script>
</body>
</html>
