<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 CONFIG FIREBASE KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* REGISTER (GANTI LOCALSTORAGE) */
window.register = function(){
let email = regUser.value;
let pass = regPass.value;

createUserWithEmailAndPassword(auth, email, pass)
.then(()=>{
alert("Register berhasil");
showLogin();
})
.catch(e=>alert(e.message));
}

/* LOGIN (ONLINE) */
window.login = function(){
let email = loginUser.value;
let pass = loginPass.value;

signInWithEmailAndPassword(auth, email, pass)
.then((user)=>{
masuk(user.user.email);
})
.catch(e=>alert(e.message));
}

/* MASUK */
window.masuk = function(user){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

welcome.innerText="Halo " + user;

showNews();
overlay.style.display="flex";
}

/* LOGOUT */
window.logout = function(){
signOut(auth);
dashboard.style.display="none";
loginBox.style.display="block";
overlay.style.display="none";
}

/* MENU & UI TETAP PUNYA KAMU */
window.setActiveMenu = setActiveMenu;
window.showNews = showNews;
window.showQuiz = showQuiz;
window.showInvest = showInvest;
window.tutupPopup = tutupPopup;
window.showLogin = showLogin;
window.showRegister = showRegister;
</script>
