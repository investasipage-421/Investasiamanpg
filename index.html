<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

/* LOGIN */
.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button:not(#logoutBtn){
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:white;
color:black;
cursor:pointer;
}

/* LOADING */
#loading{
display:none;
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:12px;
z-index: 999;
}

/* DASHBOARD */
#dashboard{display:none;height:100%;}

/* TOP */
#topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

#profilePic{
width:38px;
height:38px;
border-radius:50%;
border:2px solid white;
}

#welcome{
font-size:12px;
font-weight:bold;
}

#emailText{
font-size:11px;
opacity:0.8;
color: cyan; /* Diberi warna agar terlihat jelas */
}

#logoutBtn{
font-size:10px;
padding:3px 6px;
border:none;
border-radius:5px;
background:white;
cursor:pointer;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:70px;
width:75px;
background:#111;
height:auto;
padding:10px 0;
border-right:1px solid #333;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

/* MENU ITEM */
.menuItem{
text-align:center;
cursor:pointer;
padding:6px;
border-radius:10px;
transition:0.2s;
}

.menuItem img{
width:32px;
height:32px;
}

.menuItem.active{
background:white;
color:black;
}

/* CONTENT */
#content{
padding:15px;
margin-left:85px;
}

.card{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin:10px;
}
</style>
</head>
<body>

<div id="loading">Loading...</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p style="margin-top:10px; font-size:12px;">
        Belum punya akun? <span onclick="showRegister()" style="color:cyan;cursor:pointer;">Registrasi</span>
    </p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
    <h2>Register</h2>
    <input id="regUser" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password 6 Character">
    <button onclick="register()">Daftar</button>
    <p style="margin-top:10px; font-size:12px;">
        Sudah punya akun? <span onclick="showLogin()" style="color:cyan;cursor:pointer;">Login</span>
    </p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div id="topBar">
        <div style="display:flex;align-items:center;gap:8px;">
            <img id="profilePic" src="https://i.imgur.com/8Km9tLL.png">
            <div>
                <div id="welcome">Halo 👋</div>
                <div id="emailText">Memuat...</div> <!-- Tempat Email Muncul -->
            </div>
        </div>
        <button id="logoutBtn" onclick="logout()">Logout</button>
    </div>

    <div id="sidebar">
        <div class="menuItem active" onclick="showNews()"><img src="https://img.icons8.com/color/48/news.png"><div style="font-size:10px;">Berita</div></div>
        <div class="menuItem" onclick="showQuiz()"><img src="https://img.icons8.com/color/48/book-shelf.png"><div style="font-size:10px;">Soal</div></div>
        <div class="menuItem" onclick="showInvest()"><img src="https://img.icons8.com/color/48/coins.png"><div style="font-size:10px;">Invest</div></div>
    </div>

    <div id="content">
        <div id="newsBox" class="card">Selamat Datang di Berita</div>
        <div id="quizBox" class="card" style="display:none;">Daftar Soal Tersedia</div>
        <div id="investBox" class="card" style="display:none;">Halaman Investasi</div>
    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// KONFIGURASI
const firebaseConfig = {
    apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
    authDomain: "page421-b9a6c.firebaseapp.com",
    databaseURL: "https://page421-b9a6c-default-rtdb.firebaseio.com",
    projectId: "page421-b9a6c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// PENGATURAN OTOMATIS LOGIN (FIX UNTUK CHROME)
auth.onAuthStateChanged(user => {
    if (user) {
        // Jika user ditemukan (sudah login)
        document.getElementById('loginBox').style.display = "none";
        document.getElementById('registerBox').style.display = "none";
        document.getElementById('dashboard').style.display = "block";
        
        // TAMPILKAN EMAIL LANGSUNG
        document.getElementById('emailText').innerText = user.email;
        console.log("User terdeteksi: " + user.email);
    } else {
        // Jika tidak ada user
        document.getElementById('loginBox').style.display = "block";
        document.getElementById('dashboard').style.display = "none";
    }
});

/* REGISTER */
function register(){
    const email = document.getElementById('regUser').value;
    const pass = document.getElementById('regPass').value;

    // VALIDASI PASWORD HARUS 6 CHARACTER
    if(pass.length !== 6) {
        alert("Password harus 6 character!");
        return;
    }

    document.getElementById('loading').style.display="block";
    auth.createUserWithEmailAndPassword(email, pass)
    .then(userCred => {
        db.ref("users/" + userCred.user.uid).set({ email: email });
        document.getElementById('loading').style.display="none";
        alert("Berhasil Daftar!");
    })
    .catch(e => {
        document.getElementById('loading').style.display="none";
        alert(e.message);
    });
}

/* LOGIN */
function login(){
    const email = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;

    document.getElementById('loading').style.display="block";
    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        document.getElementById('loading').style.display="none";
    })
    .catch(e => {
        document.getElementById('loading').style.display="none";
        alert(e.message);
    });
}

/* LOGOUT */
function logout(){
    auth.signOut().then(() => {
        location.reload(); // Refresh halaman setelah logout agar bersih
    });
}

/* NAVIGASI UI */
function showLogin(){ 
    document.getElementById('registerBox').style.display="none"; 
    document.getElementById('loginBox').style.display="block"; 
}
function showRegister(){ 
    document.getElementById('loginBox').style.display="none"; 
    document.getElementById('registerBox').style.display="block"; 
}

/* MENU DASHBOARD */
function setActive(index){
    let items = document.querySelectorAll(".menuItem");
    items.forEach((el, i) => {
        el.classList.remove("active");
        if(i === index) el.classList.add("active");
    });
}
function showNews(){ setActive(0); document.getElementById('newsBox').style.display="block"; document.getElementById('quizBox').style.display="none"; document.getElementById('investBox').style.display="none"; }
function showQuiz(){ setActive(1); document.getElementById('newsBox').style.display="none"; document.getElementById('quizBox').style.display="block"; document.getElementById('investBox').style.display="none"; }
function showInvest(){ setActive(2); document.getElementById('newsBox').style.display="none"; document.getElementById('quizBox').style.display="none"; document.getElementById('investBox').style.display="block"; }

</script>
</body>
</html>
