<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB Uuusb</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    z-index:-1;
}

.box{
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    background:white;
    color:black;
}

.switchText{
    color:white;
    margin-top:12px;
    display:block;
    cursor:pointer;
}

#dashboard{display:none;height:100%;}

#sidebar{
    width:80px;
    height:100%;
    float:left;
    background:#111;
    border-right:1px solid #333;
    text-align:center;
    padding-top:20px;
}

.menuItem{
    font-size:20px;
    margin:15px 5px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:8px 0;
    border-radius:10px;
}

.menuItem:hover{background:#222;}

.menuItem.active{
    background:white;
    color:black;
}

#mainContent{
    margin-left:80px;
    padding:15px;
    height:100vh;
}

.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<p class="switchText" onclick="showRegister()">
Belum punya akun? Registrasi sekarang
</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>

<input id="regUser" placeholder="Email">

<input id="regPass" type="password" placeholder="Password 6 karakter">

<p style="font-size:12px;opacity:0.7;margin-top:-5px;">
Password minimal 6 karakter
</p>

<button onclick="register()">Daftar</button>

<p class="switchText" onclick="showLogin()">
Sudah punya akun? Login sekarang
</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div id="sidebar">
<div class="menuItem active" onclick="showNews()">📰<br><span>Berita</span></div>
<div class="menuItem" onclick="showQuiz()">📚<br><span>Soal</span></div>
<div class="menuItem" onclick="showInvest()">💰<br><span>Invest</span></div>
</div>

<div id="mainContent">

<button onclick="logout()">Logout</button>

<div id="welcome"></div>

<div id="newsBox"></div>
<div id="quizBox" style="display:none;"></div>
<div id="investBox" style="display:none;"></div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* REGISTER */
function register(){
let email = regUser.value;
let pass = regPass.value;

if(pass.length < 6){
alert("Password minimal 6 karakter");
return;
}

auth.createUserWithEmailAndPassword(email, pass)
.then(()=>{
alert("Register sukses");
showLogin();
})
.catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
let email = loginUser.value;
let pass = loginPass.value;

auth.signInWithEmailAndPassword(email, pass)
.then((user)=>{
masuk(user.user.email);
})
.catch(e=>alert(e.message));
}

/* MASUK */
function masuk(user){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

welcome.innerText="Halo " + user;
showNews();
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

/* MENU */
function showNews(){
newsBox.style.display="block";
quizBox.style.display="none";
investBox.style.display="none";
newsBox.innerHTML="<div class='card'>Berita</div>";
}

function showQuiz(){
newsBox.style.display="none";
quizBox.style.display="block";
investBox.style.display="none";
quizBox.innerHTML="<div class='card'>Soal</div>";
}

function showInvest(){
newsBox.style.display="none";
quizBox.style.display="none";
investBox.style.display="block";
investBox.innerHTML="<div class='card'>Investasi</div>";
}
</script>

</body>
</html>
