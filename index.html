<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

/* LOADING */
#loading{
display:none;
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:12px;
z-index: 1000;
background: rgba(0,0,0,0.5);
padding: 5px 10px;
border-radius: 5px;
}

/* BOX LOGIN & REGISTER */
.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border: 1px solid #333;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
outline: none;
}

button:not(#logoutBtn){
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:white;
color:black;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;height:100%;}

/* TOP BAR */
#topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background: #111;
border-bottom: 1px solid #333;
}

#profilePic{
width:40px;
height:40px;
border-radius:50%;
border:2px solid white;
}

#welcome{
font-size:14px;
font-weight:bold;
}

#emailText{
font-size:11px;
color: cyan;
opacity: 0.9;
}

#logoutBtn{
font-size:11px;
padding:5px 10px;
border:none;
border-radius:5px;
background:white;
color: black;
cursor:pointer;
font-weight: bold;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:75px;
width:75px;
background:#111;
height:100%;
padding-top:20px;
border-right:1px solid #333;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.menuItem{
text-align:center;
cursor:pointer;
padding:8px;
border-radius:10px;
width: 60px;
transition: 0.3s;
}

.menuItem img{
width:30px;
height:30px;
}

.menuItem.active{
background:white;
color:black;
}

/* CONTENT */
#content{
padding:20px;
margin-left:80px;
overflow-y: auto;
height: calc(100% - 75px);
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-bottom:15px;
font-weight: bold;
}
</style>
</head>
<body>

<div id="loading">Mohon tunggu...</div>

<!-- LOGIN BOX -->
<div class="box" id="loginBox">
    <h2>Login</h2>
    <input id="loginUser" type="email" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p style="margin-top:15px; font-size:13px;">
        Belum punya akun? <span onclick="showRegister()" style="color:cyan;cursor:pointer;">Daftar di sini</span>
    </p>
</div>

<!-- REGISTER BOX -->
<div class="box" id="registerBox" style="display:none;">
    <h2>Register</h2>
    <input id="regUser" type="email" placeholder="Email Baru">
    <input id="regPass" type="password" placeholder="Password 6 Character">
    <button onclick="register()">Daftar</button>
    <p style="margin-top:15px; font-size:13px;">
        Sudah punya akun? <span onclick="showLogin()" style="color:cyan;cursor:pointer;">Login di sini</span>
    </p>
</div>

<!-- DASHBOARD UI -->
<div id="dashboard">
    <div id="topBar">
        <div style="display:flex;align-items:center;gap:10px;">
            <img id="profilePic" src="https://i.imgur.com/8Km9tLL.png">
            <div>
                <div id="welcome">Halo 👋</div>
                <div id="emailText">Memuat email...</div>
            </div>
        </div>
        <button id="logoutBtn" onclick="logout()">Logout</button>
    </div>

    <div id="sidebar">
        <div class="menuItem active" id="mNews" onclick="showNews()">
            <img src="https://img.icons8.com/color/48/news.png">
            <div style="font-size:10px;">Berita</div>
        </div>
        <div class="menuItem" id="mQuiz" onclick="showQuiz()">
            <img src="https://img.icons8.com/color/48/book-shelf.png">
            <div style="font-size:10px;">Soal</div>
        </div>
        <div class="menuItem" id="mInvest" onclick="showInvest()">
            <img src="https://img.icons8.com/color/48/coins.png">
            <div style="font-size:10px;">Invest</div>
        </div>
    </div>

    <div id="content">
        <div id="newsBox" class="card">Halaman Berita</div>
        <div id="quizBox" class="card" style="display:none;">Halaman Soal Latihan</div>
        <div id="investBox" class="card" style="display:none;">Halaman Investasi</div>
    </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// KONFIGURASI FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
    authDomain: "page421-b9a6c.firebaseapp.com",
    databaseURL: "https://page421-b9a6c-default-rtdb.firebaseio.com",
    projectId: "page421-b9a6c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// CEK STATUS LOGIN (PENTING UNTUK CHROME)
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginBox').style.display = "none";
        document.getElementById('registerBox').style.display = "none";
        document.getElementById('dashboard').style.display = "block";
        document.getElementById('emailText').innerText = user.email;
    } else {
        document.getElementById('loginBox').style.display = "block";
        document.getElementById('dashboard').style.display = "none";
    }
});

/* FUNGSI REGISTER */
function register(){
    const email = document.getElementById('regUser').value;
    const pass = document.getElementById('regPass').value;

    // VALIDASI HARUS TEPAT 6 CHARACTER
    if(pass.length !== 6){
        alert("Gagal: Password harus 6 character!");
        return;
    }

    if(email === ""){
        alert("Email tidak boleh kosong!");
        return;
    }

    document.getElementById('loading').style.display = "block";

    auth.createUserWithEmailAndPassword(email, pass)
    .then(userCred => {
        // Simpan ke Database
        db.ref("users/" + userCred.user.uid).set({ email: email });

        // PAKSA LOGOUT SUPAYA LOGIN ULANG
        auth.signOut().then(() => {
            document.getElementById('loading').style.display = "none";
            alert("Registrasi Berhasil! Silakan Login.");
            showLogin();
            // Reset input
            document.getElementById('regUser').value = "";
            document.getElementById('regPass').value = "";
        });
    })
    .catch(e => {
        document.getElementById('loading').style.display = "none";
        alert(e.message);
    });
}

/* FUNGSI LOGIN */
function login(){
    const email = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;

    document.getElementById('loading').style.display = "block";

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        document.getElementById('loading').style.display = "none";
    })
    .catch(e => {
        document.getElementById('loading').style.display = "none";
        alert("Login Gagal: " + e.message);
    });
}

/* FUNGSI LOGOUT */
function logout(){
    auth.signOut().then(() => {
        location.reload();
    });
}

/* NAVIGASI LOGIN/REG */
function showLogin(){
    document.getElementById('registerBox').style.display = "none";
    document.getElementById('loginBox').style.display = "block";
}

function showRegister(){
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('registerBox').style.display = "block";
}

/* MENU DASHBOARD */
function clearMenu(){
    document.getElementById('mNews').classList.remove('active');
    document.getElementById('mQuiz').classList.remove('active');
    document.getElementById('mInvest').classList.remove('active');
    document.getElementById('newsBox').style.display = "none";
    document.getElementById('quizBox').style.display = "none";
    document.getElementById('investBox').style.display = "none";
}

function showNews(){
    clearMenu();
    document.getElementById('mNews').classList.add('active');
    document.getElementById('newsBox').style.display = "block";
}

function showQuiz(){
    clearMenu();
    document.getElementById('mQuiz').classList.add('active');
    document.getElementById('quizBox').style.display = "block";
}

function showInvest(){
    clearMenu();
    document.getElementById('mInvest').classList.add('active');
    document.getElementById('investBox').style.display = "block";
}
</script>
</body>
</html>
