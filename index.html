<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investasi Page421</title>

<style>
body{background:black;color:white;font-family:Arial;margin:0}
.box{padding:20px;text-align:center}
input{padding:10px;margin:5px;width:80%}
button{padding:10px;margin:5px}
#dashboard{display:none}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Login</h2>
<input id="loginUser" type="email" placeholder="Email"><br>
<input id="loginPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="showRegister()">Register</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="box" style="display:none">
<h2>Register</h2>
<input id="regUser" type="email" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Daftar</button>
<button onclick="showLogin()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">
<h3 id="emailText"></h3>
<h2 id="saldo">Rp 0</h2>

<h3>Topup Saldo</h3>
<input type="number" id="nominalTopup" placeholder="Masukkan nominal"><br>
<button onclick="kirimTopup()">Kirim Topup</button>

<br><br>
<button onclick="logout()">Logout</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

// CONFIG FIREBASE (PUNYA KAMU)
const firebaseConfig = {
  apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
  authDomain: "page421-b9a6c.firebaseapp.com",
  databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "page421-b9a6c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let saldo = 0;

// CEK LOGIN
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("emailText").innerText = user.email;

    db.ref("users/"+user.uid).on("value", snap=>{
      let data = snap.val();
      if(data){
        saldo = data.balance || 0;
        document.getElementById("saldo").innerText = "Rp "+saldo;
      }
    });

  }else{
    document.getElementById("loginBox").style.display="block";
    document.getElementById("dashboard").style.display="none";
  }
});

// REGISTER
function register(){
  let email = regUser.value;
  let pass = regPass.value;

  auth.createUserWithEmailAndPassword(email,pass)
  .then(res=>{
    db.ref("users/"+res.user.uid).set({
      email: email,
      balance: 0
    });
    alert("Berhasil daftar");
  })
  .catch(e=>alert(e.message));
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(loginUser.value,loginPass.value)
  .catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
  auth.signOut();
}

// TOPUP
function kirimTopup(){
  let user = auth.currentUser;
  let nominal = nominalTopup.value;

  if(!nominal){
    alert("Isi nominal!");
    return;
  }

  let id = Date.now();

  db.ref("topup/"+id).set({
    uid: user.uid,
    email: user.email,
    nominal: parseInt(nominal),
    status: "pending"
  });

  alert("Topup dikirim!");
}

// UI
function showRegister(){
  loginBox.style.display="none";
  registerBox.style.display="block";
}
function showLogin(){
  registerBox.style.display="none";
  loginBox.style.display="block";
}

</script>

</body>
</html>
