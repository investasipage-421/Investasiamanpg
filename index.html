<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investasi Premium - Firebase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus+Jakarta+Sans', sans-serif; background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .font-space { font-family: 'Space+Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanline { background: linear-gradient(to bottom, transparent, rgba(0, 255, 255, 0.05), transparent); animation: scanline 8s linear infinite; }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="app"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // CONFIGURASI FIREBASE ANDA
        const firebaseConfig = {
            projectId: "gen-lang-client-0708232656",
            appId: "1:58443154757:web:985199f66dca38d62d2a2c",
            apiKey: "AIzaSyDpJa4LYXmVNho6f09PcdIi-1sLGreDvHA",
            authDomain: "gen-lang-client-0708232656.firebaseapp.com",
            storageBucket: "gen-lang-client-0708232656.firebasestorage.app",
            messagingSenderId: "58443154757"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, "ai-studio-a807cab4-1607-4f53-a500-3eb956cf2f21");

        // UI State
        const root = document.getElementById('app');
        let user = null;
        let isRegister = false;
        let isLoading = false;
        let deposits = [];
        let withdrawals = [];
        let investments = [];
        let balance = 0;
        let chats = [];

        function render() {
            if (!user) {
                renderAuth();
            } else {
                renderDashboard();
            }
            lucide.createIcons();
        }

        function renderAuth() {
            root.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 bg-[#050505] relative overflow-hidden">
                    <div class="absolute inset-0 scanline opacity-30 select-none pointer-events-none"></div>
                    <div class="w-full max-w-md space-y-8 relative z-10 animate_animated animate_fadeIn">
                        <div class="text-center space-y-2">
                            <i data-lucide="shield-check" class="w-12 h-12 text-cyan-400 mx-auto mb-4"></i>
                            <h1 class="text-4xl font-space font-bold tracking-tighter">SECURE ACCESS</h1>
                            <p class="text-gray-500">Masuk untuk mengelola dana Anda</p>
                        </div>
                        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
                            <form id="authForm" class="space-y-4">
                                <input type="email" id="email" class="w-full h-14 bg-[#0a0a0a] border border-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-cyan-500/50" placeholder="Email" required>
                                <input type="password" id="password" class="w-full h-14 bg-[#0a0a0a] border border-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-cyan-500/50" placeholder="Password" required>
                                <button type="submit" class="w-full h-14 bg-cyan-500 text-black font-extrabold rounded-2xl hover:bg-cyan-400 transition-all">
                                    ${isLoading ? 'MEMPROSES...' : (isRegister ? 'DAFTAR SEKARANG' : 'MASUK')}
                                </button>
                                <p class="text-center text-xs text-gray-500 mt-4 h-10 flex items-center justify-center">
                                    <span id="toggleAuth" class="text-cyan-400 cursor-pointer font-bold hover:underline p-2">
                                        ${isRegister ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar'}
                                    </span>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('authForm').onsubmit = (e) => {
                e.preventDefault();
                handleAuth(document.getElementById('email').value, document.getElementById('password').value);
            };
            document.getElementById('toggleAuth').onclick = () => { isRegister = !isRegister; render(); };
        }

        async function handleAuth(email, password) {
            isLoading = true; render();
            try {
                if (isRegister) {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, email, createdAt: Date.now() });
                    alert("Pendaftaran Berhasil!");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (e) { alert("Gagal: " + e.message); }
            finally { isLoading = false; render(); }
        }

        function renderDashboard() {
            const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n);
            root.innerHTML = `
                <div class="min-h-screen bg-[#050505] p-4 pb-24 max-w-xl mx-auto animate_animated animate_fadeIn">
                    <header class="flex justify-between items-center mb-8">
                        <div class="truncate mr-4">
                            <p class="text-[10px] font-bold text-cyan-500 uppercase tracking-widest">USER AKTIF</p>
                            <h2 class="font-space font-bold truncate">${user.email}</h2>
                        </div>
                        <button id="logoutBtn" class="p-4 glass rounded-2xl text-red-400"><i data-lucide="log-out"></i></button>
                    </header>

                    <div class="glass p-8 rounded-[2.5rem] mb-6 bg-gradient-to-br from-cyan-500/10 to-transparent">
                        <p class="text-xs font-bold text-gray-500 tracking-widest mb-2">SALDO ANDA</p>
                        <h3 class="text-4xl font-space font-bold tracking-tighter mb-8">${formatIDR(balance)}</h3>
                        <div class="flex gap-4">
                            <button id="depoBtn" class="flex-1 h-14 bg-white text-black font-extrabold rounded-2xl">DEPOSIT</button>
                            <button id="tarikBtn" class="flex-1 h-14 glass font-extrabold rounded-2xl">TARIK</button>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-[2.5rem] mb-8 ring-1 ring-cyan-500/20">
                        <h4 class="font-space font-bold mb-4">PAKET PREMIUM A</h4>
                        <div class="grid grid-cols-2 gap-3 mb-6 font-space">
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <p class="text-[10px] text-gray-500 font-black">HARGA</p>
                                <p>Rp 20.000</p>
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <p class="text-[10px] text-cyan-500 font-black">PROFIT/HARI</p>
                                <p>Rp 500</p>
                            </div>
                        </div>
                        <button id="buyBtn" class="w-full h-14 bg-cyan-500 text-black font-extrabold rounded-2xl shadow-lg shadow-cyan-500/20">MULAI INVESTASI</button>
                    </div>

                    <div class="space-y-4" id="historyList"></div>

                    <div class="fixed bottom-6 right-6"><button id="openChat" class="w-14 h-14 bg-cyan-500 text-black rounded-full shadow-2xl flex items-center justify-center animate-bounce"><i data-lucide="message-circle"></i></button></div>
                </div>
            `;
            document.getElementById('logoutBtn').onclick = () => signOut(auth);
            document.getElementById('depoBtn').onclick = async () => {
                await addDoc(collection(db, "deposits"), { uid: user.uid, email: user.email, nominal: 50000, status: 'pending', timestamp: Date.now() });
                alert("Deposit Rp 50.000 diajukan!");
            };
            document.getElementById('tarikBtn').onclick = async () => {
                const n = parseInt(prompt("Jumlah Tarik (Min 50rb):", "50000"));
                if (n >= 50000 && balance >= (n + 5000)) {
                    await addDoc(collection(db, "withdrawals"), { uid: user.uid, email: user.email, nominal: n, biayaAdmin: 5000, status: 'pending', timestamp: Date.now() });
                    alert("Penarikan diajukan!");
                } else { alert("Saldo tidak cukup!"); }
            };
            document.getElementById('buyBtn').onclick = async () => {
                if (balance >= 20000) {
                    await addDoc(collection(db, "investments"), { uid: user.uid, tanggalBeli: Date.now() });
                    alert("Investasi Berhasil!");
                } else { alert("Saldo Kurang!"); }
            };
            updateHistory();
        }

        function updateHistory() {
            const list = document.getElementById('historyList');
            const all = [...deposits, ...withdrawals, ...investments].sort((a,b) => (b.timestamp || b.tanggalBeli) - (a.timestamp || a.tanggalBeli));
            if (!list) return;
            list.innerHTML = <h4 class="font-space font-bold ml-2">RIWAYAT</h4> + all.map(i => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center text-sm">
                    <div>
                        <p class="font-bold">${i.nominal ? 'Transaksi' : 'Investasi'}</p>
                        <p class="text-[10px] text-gray-500">${new Date(i.timestamp || i.tanggalBeli).toLocaleDateString()}</p>
                    </div>
                    <span class="text-cyan-400 font-black">${i.status || 'Aktif'}</span>
                </div>
            `).join('');
        }

        onAuthStateChanged(auth, u => {
            if (u) {
                user = { uid: u.uid, email: u.email };
                onSnapshot(query(collection(db, "deposits"), where("uid", "==", u.uid)), s => { deposits = s.docs.map(d => d.data()); calculate(); });
                onSnapshot(query(collection(db, "withdrawals"), where("uid", "==", u.uid)), s => { withdrawals = s.docs.map(d => d.data()); calculate(); });
                onSnapshot(query(collection(db, "investments"), where("uid", "==", u.uid)), s => { investments = s.docs.map(d => d.data()); calculate(); });
            } else { user = null; render(); }
        });

        function calculate() {
            const d = deposits.filter(x => x.status === 'selesai').reduce((a, b) => a + b.nominal, 0);
            const w = withdrawals.reduce((a, b) => a + (b.nominal + b.biayaAdmin), 0);
            const p = investments.reduce((a, b) => a + (Math.floor((Date.now() - b.tanggalBeli)/86400000)*500), 0);
            balance = d + p - w - (investments.length * 20000);
            render();
        }
    </script>
</body>
</html>
