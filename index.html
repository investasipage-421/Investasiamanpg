<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB Uuusb</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    z-index:-1;
}

/* TOP BAR */
#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

/* PROFILE */
#profileBar{
    display:flex;
    align-items:center;
    gap:8px;
}

#profilePic{
    width:38px;
    height:38px;
    border-radius:50%;
    border:2px solid white;
    object-fit:cover;
    cursor:pointer;
}

#userText{
    display:flex;
    flex-direction:column;
}

#welcome{
    font-size:12px;
    font-weight:bold;
}

#emailText{
    font-size:9px;
    opacity:0.6;
}

/* LOGOUT */
#logoutBtn{
    padding:3px 6px;
    font-size:9px;
    border-radius:5px;
    background:white;
    color:black;
    border:none;
}

/* HIDDEN INPUT */
#fileInput{
    display:none;
}
</style>
</head>

<body>

<!-- DASHBOARD HEADER -->
<div id="topBar">

    <div id="profileBar">

        <!-- FOTO PROFIL (klik = buka galeri) -->
        <img id="profilePic"
             src="https://i.imgur.com/8Km9tLL.png"
             onclick="document.getElementById('fileInput').click()">

        <div id="userText">
            <div id="welcome">Halo User</div>
            <div id="emailText">user@email.com</div>
        </div>

    </div>

    <button id="logoutBtn" onclick="logout()">Logout</button>

</div>

<!-- INPUT FILE -->
<input type="file" id="fileInput" accept="image/*" onchange="uploadProfile(event)">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN SUCCESS */
function masuk(user){

let nama = user.split("@")[0].replace(/\./g," ");

welcome.innerText = "Halo " + nama;
emailText.innerText = user;

/* LOAD FOTO PROFIL */
let saved = localStorage.getItem("pfp_" + user);
if(saved){
document.getElementById("profilePic").src = saved;
}
}

/* UPLOAD FOTO PROFIL */
function uploadProfile(event){
let file = event.target.files[0];
if(!file) return;

let reader = new FileReader();

reader.onload = function(e){
let img = e.target.result;

/* tampilkan langsung */
document.getElementById("profilePic").src = img;

/* simpan permanen di browser */
let user = auth.currentUser.email;
localStorage.setItem("pfp_" + user, img);
};

reader.readAsDataURL(file);
}

/* LOGOUT */
function logout(){
auth.signOut();
location.reload();
}
</script>

</body>
</html>
