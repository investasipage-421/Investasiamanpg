<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
background:white;
color:black;
}

#dashboard{display:none;}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p onclick="register()" style="color:cyan;cursor:pointer;">Daftar</p>
</div>

<div id="dashboard">
<h2>Dashboard</h2>
<p id="status"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG FIREBASE KAMU
const firebaseConfig = {
apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
authDomain: "page421.firebaseapp.com",
projectId: "page421"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* REGISTER */
function register(){
let email = prompt("Email:");
let pass = prompt("Password (min 6):");

auth.createUserWithEmailAndPassword(email, pass)
.then(()=>{
alert("Register berhasil ✔");
})
.catch(e=>alert("ERROR: "+e.message));
}

/* LOGIN */
function login(){
let email = loginUser.value;
let pass = loginPass.value;

auth.signInWithEmailAndPassword(email, pass)
.then(u=>{
loginBox.style.display="none";
dashboard.style.display="block";
status.innerText="Login sebagai: "+u.user.email;
})
.catch(e=>alert("ERROR: "+e.message));
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
}

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
dashboard.style.display="block";
status.innerText="Login sebagai: "+user.email;
}
});

</script>

</body>
</html>
