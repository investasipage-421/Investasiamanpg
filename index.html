<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investasi page421</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    color:white;
}

/* LOGIN REGISTER */
.box{
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

button:not(#logoutBtn){
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:white;
    color:black;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;height:100%;}

/* TOP BAR */
#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

#profilePic{
    width:38px;
    height:38px;
    border-radius:50%;
    border:2px solid white;
}

#welcome{
    font-size:12px;
    font-weight:bold;
}

#emailText{
    font-size:10px;
    opacity:0.7;
}

#logoutBtn{
    font-size:10px;
    padding:3px 6px;
    border:none;
    border-radius:5px;
    background:white;
    cursor:pointer;
}

/* MENU ICON */
.menuBar{
    display:flex;
    justify-content:space-around;
    padding:12px;
    background:#111;
}

.menuItem{
    text-align:center;
    cursor:pointer;
}

.menuItem img{
    width:35px;
    height:35px;
}

/* CONTENT */
.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    margin:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<p>
Belum punya akun?
<span onclick="showRegister()" style="color:cyan;cursor:pointer;">
Registrasi sekarang
</span>
</p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
<h2>Register</h2>
<input id="regUser" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>

<p>
Sudah punya akun?
<span onclick="showLogin()" style="color:cyan;cursor:pointer;">
Login sekarang
</span>
</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<!-- TOP -->
<div id="topBar">
    <div style="display:flex;align-items:center;gap:8px;">
        <img id="profilePic" src="https://i.imgur.com/8Km9tLL.png">
        <div>
            <div id="welcome">ID: -</div>
            <div id="emailText">email</div>
        </div>
    </div>

    <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<!-- ICON MENU -->
<div class="menuBar">

    <div class="menuItem" onclick="showNews()">
        <img src="https://cdn-icons-png.flaticon.com/512/21/21601.png">
        <div style="font-size:11px;">Berita</div>
    </div>

    <div class="menuItem" onclick="showQuiz()">
        <img src="https://cdn-icons-png.flaticon.com/512/29/29302.png">
        <div style="font-size:11px;">Soal</div>
    </div>

    <div class="menuItem" onclick="showInvest()">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">
        <div style="font-size:11px;">Invest</div>
    </div>

</div>

<!-- CONTENT -->
<div id="newsBox" class="card">Berita</div>
<div id="quizBox" class="card" style="display:none;">Soal</div>
<div id="investBox" class="card" style="display:none;">Investasi</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ5rTxZkIueebv_JRYXDBAtZiClvvHgGw",
  authDomain: "page421.firebaseapp.com",
  projectId: "page421",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ID 4 digit */
function getOrCreateID(email){
let key="id_"+email;
let id=localStorage.getItem(key);

if(!id){
id=Math.floor(1000+Math.random()*9000);
localStorage.setItem(key,id);
}
return id;
}

/* REGISTER */
function register(){
auth.createUserWithEmailAndPassword(regUser.value,regPass.value)
.then(()=>alert("Register sukses"))
.catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(loginUser.value,loginPass.value)
.then(u=>masuk(u.user.email))
.catch(e=>alert(e.message));
}

/* MASUK */
function masuk(email){
loginBox.style.display="none";
registerBox.style.display="none";
dashboard.style.display="block";

welcome.innerText="ID: "+getOrCreateID(email);
emailText.innerText=email;
}

/* LOGOUT */
function logout(){
auth.signOut();
dashboard.style.display="none";
loginBox.style.display="block";
}

/* SWITCH */
function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

/* MENU */
function showNews(){
newsBox.style.display="block";
quizBox.style.display="none";
investBox.style.display="none";
}

function showQuiz(){
newsBox.style.display="none";
quizBox.style.display="block";
investBox.style.display="none";
}

function showInvest(){
newsBox.style.display="none";
quizBox.style.display="none";
investBox.style.display="block";
}
</script>

</body>
</html>
