<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Firebase Login</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}
.box{
  width:90%;
  max-width:350px;
  margin:100px auto;
  background:#222;
  padding:20px;
  border-radius:10px;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Firebase Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Daftar</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>
</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// 🔑 CONFIG KAMU
const firebaseConfig = {
  apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
  authDomain: "page421-b9a6c.firebaseapp.com",
  projectId: "page421-b9a6c",
  appId: "1:299269632550:web:ab2fe1e15b8d2cebbb6ce7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 REGISTER
window.register = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
  .then(() => {
    status.innerText = "Berhasil daftar ✔";
  })
  .catch(err => alert(err.message));
}

// 🔥 LOGIN
window.login = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
  .then(() => {
    status.innerText = "Login berhasil ✔";
  })
  .catch(err => alert(err.message));
}

// 🔥 LOGOUT
window.logout = function(){
  signOut(auth).then(() => {
    status.innerText = "Logout ✔";
  });
}

</script>

</body>
</html>
